<!----------- mainsub ----------->
{% if target == "mainsub" %}
    <!-- [Modal] 분석 리포트 팝업 -->
    <div class="modal fade" id="analysisModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content p-4">
                <div class="modal-header border-0 px-0">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-magnifying-glass-chart me-2"></i>관련 카테고리 주문 통계</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body bg-white rounded-3 p-4 mt-2 border">
                    <div class="row align-items-center mb-4 text-center">
                        <div class="col-md-6 text-start">
                            <h6 class="fw-bold mb-3">관련 카테고리 주문 통계</h6>
                            <p class="small text-muted mb-1">가장 많이 찾은 카테고리: <strong>#밀키트 #샌드위치</strong></p>
                            <p class="small text-muted">평균 섭취 칼로리: <strong>약 1,150kcal / 끼</strong></p>
                        </div>
                        <div class="col-md-6">
                            <i class="fa-solid fa-chart-pie fa-5x text-warning opacity-50"></i>
                        </div>
                    </div>
                    <div class="p-3 bg-light rounded text-center mt-3">
                        <p class="mb-0"><strong>UniCook AI 추천:</strong> 저녁에는 소화가 잘 되는 <span class="text-success fw-bold">단백질 샐러드</span> 어떠신가요?</p>
                    </div>
                </div>
                <div class="modal-footer border-0 px-0 mt-3">
                    <button type="button" class="btn btn-sand px-5 py-2 mx-auto" data-bs-dismiss="modal">확인 완료</button>
                </div>
            </div>
        </div>
    </div>
{% endif %}
